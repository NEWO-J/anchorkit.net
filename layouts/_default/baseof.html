<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="/" class="nav-logo">
        <svg class="nav-logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="5" r="3"/>
          <line x1="12" y1="8" x2="12" y2="21"/>
          <path d="M5 15l7 6 7-6"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        AnchorKit
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/verify/">Verify</a></li>
        <li><a href="/docs/">Docs</a></li>
        <li><a href="https://github.com/NEWO-J/AnchorKit" target="_blank" rel="noopener">GitHub</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <p>AnchorKit &mdash; Photo provenance on Solana</p>
  </footer>
</body>
</html>
