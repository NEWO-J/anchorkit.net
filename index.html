
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preload hero background video so playback starts before React mounts -->
    <link rel="preload" as="video" href="/background.mp4" type="video/mp4" fetchpriority="high" />
    <!-- Preload 3D phone model and Draco WASM so they're ready before user scrolls -->
    <link rel="preload" as="fetch" href="/phone_v3.glb" crossorigin />
    <link rel="preload" as="fetch" href="/draco/draco_decoder.wasm" crossorigin />
    <!-- Preload phone textures so they're in cache when Three.js requests them -->
    <link rel="preload" as="image" href="/circuitboards_diffuse.webp" />
    <link rel="preload" as="image" href="/ipx_PCBdark_diffuse.webp" />
    <link rel="preload" as="image" href="/ipx_metalsheets_diffuse.webp" />
    <link rel="preload" as="image" href="/ipx_batterydiffuse.webp" />
    <link rel="preload" as="image" href="/ipx_lens.webp" />
    <link rel="preload" as="image" href="/ipx_flash.webp" />

    <!-- Primary SEO -->
    <title>AnchorKit</title>
    <meta name="title" content="AnchorKit — Hardware-Attested Photo Provenance SDK for Android" />
    <meta name="description" content="AnchorKit cryptographically binds photos to the Android device that captured them using hardware attestation. Proof is anchored on Solana — trust once, verified forever without trusting a vendor." />
    <meta name="keywords" content="AnchorKit, photo provenance, hardware attestation, Android attestation, content authenticity, deepfake detection, Solana, blockchain, media integrity, C2PA alternative" />
    <meta name="author" content="Jonah Owen" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://anchorkit.net/" />

    <!-- Open Graph (social sharing + Google rich results) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://anchorkit.net/" />
    <meta property="og:site_name" content="AnchorKit" />
    <meta property="og:title" content="AnchorKit — Hardware-Attested Photo Provenance SDK" />
    <meta property="og:description" content="Cryptographically bind photos to the Android device that captured them. Trust once at capture, verified forever on Solana — no vendor lock-in." />
    <meta property="og:image" content="https://anchorkit.net/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://anchorkit.net/" />
    <meta name="twitter:title" content="AnchorKit — Hardware-Attested Photo Provenance SDK" />
    <meta name="twitter:description" content="Cryptographically bind photos to the Android device that captured them. Trust once at capture, verified forever on Solana — no vendor lock-in." />
    <meta name="twitter:image" content="https://anchorkit.net/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/src/assets/icon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/src/assets/icon.ico" />

    <!-- Theme -->
    <meta name="theme-color" content="#030028" />

    <!-- Content Security Policy
         connect-src restricts fetch/XHR to our own API, limiting data exfiltration
         if XSS were ever achieved. script-src 'self' blocks injected inline scripts.
         Note: X-Frame-Options, HSTS, and X-Content-Type-Options require HTTP headers
         and are configured in public/_headers (Cloudflare Pages / Netlify). -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   connect-src 'self' https://api.anchorkit.net;
                   script-src 'self' 'wasm-unsafe-eval';
                   worker-src blob:;
                   style-src 'self' 'unsafe-inline';
                   img-src 'self' data: https: blob:;
                   object-src 'none';" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AnchorKit",
      "url": "https://anchorkit.net",
      "description": "AnchorKit cryptographically binds photos to the Android device that captured them using Android Keystore hardware attestation. Proof is anchored on Solana so authenticity can be verified forever without trusting a vendor.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Jonah Owen"
      },
      "keywords": "photo provenance, hardware attestation, Android, content authenticity, deepfake, Solana, blockchain"
    }
    </script>
  </head>

  <body>
    <!-- www → apex redirect and SPA path restoration moved to external scripts
         so Content-Security-Policy can use script-src 'self' without unsafe-inline. -->
    <script src="/www-redirect.js"></script>
    <script src="/spa-redirect.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
