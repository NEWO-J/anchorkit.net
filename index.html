  <body>
    <!-- Redirect www to apex domain -->
    <script>
      if (window.location.hostname === 'www.anchorkit.net') {
        window.location.replace(
          window.location.href.replace('//www.anchorkit.net', '//anchorkit.net')
        );
      }
    </script>
    <!-- Restore path after GitHub Pages 404 redirect -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var h = params.get('h') || '';
          window.history.replaceState(null, '', decodeURIComponent(p) + decodeURIComponent(h));
        }
      })();
    </script>
