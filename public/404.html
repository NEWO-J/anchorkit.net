<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AnchorKit</title>
    <script>
      // GitHub Pages SPA redirect — encode the full path+query into the
      // homepage URL so index.html can restore it before React boots.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
